    <script type="text/javascript">
        // 解析播放核心函数
        function dihejk() {
            var selectElem = document.getElementById("jk");
            var urlInput = document.getElementById("url");
            var iframePlayer = document.getElementById("player");
            
            var apiUrl = selectElem.options[selectElem.selectedIndex].value;
            var videoUrl = urlInput.value.trim();
            
            if (!videoUrl) {
                alert("请粘贴或输入需要解析的视频网址 (如: https://v.qq.com/xxx 或 bilibili链接)");
                return false;
            }
            
            if (!videoUrl.match(/^https?:\/\//i)) {
                videoUrl = "https://" + videoUrl;
            }
            
            var finalUrl = apiUrl + encodeURIComponent(videoUrl);
            iframePlayer.src = finalUrl;
            iframePlayer.scrollIntoView({ behavior: "smooth", block: "start" });
            return true;
        }
        
        window.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);
            var autoUrl = urlParams.get('url');
            if (autoUrl) {
                var inputBox = document.getElementById("url");
                if (inputBox) {
                    inputBox.value = decodeURIComponent(autoUrl);
                    setTimeout(function() {
                        dihejk();
                    }, 200);
                }
            }
        });
        
        if (typeof dihejk !== 'function') {
            window.dihejk = function() {
                alert("播放器初始化完成，请重试");
            };
        }

<script>
    (function(){
        window.dihejk = window.dihejk || function(){
            var selectElem = document.getElementById("jk");
            var urlInput = document.getElementById("url");
            var iframePlayer = document.getElementById("player");
            if(!selectElem || !urlInput || !iframePlayer) return;
            var apiUrl = selectElem.options[selectElem.selectedIndex].value;

            if(!videoUrl) { alert("请输入需要解析的视频链接～"); return; }

            var finalPlayUrl = apiUrl + encodeURIComponent(videoUrl);
            iframePlayer.src = finalPlayUrl;
        };
        
        var btn = document.querySelector("button[onclick='dihejk()']");
        if(btn) {
            btn.onclick = function(e) {
                e.preventDefault();
                window.dihejk();
            };
        }
        
        var urlField = document.getElementById("url");
        if(urlField) {
            urlField.addEventListener("keypress", function(e) {
                if(e.key === "Enter") {
